name = "custosoft-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# workers.dev-Subdomain aktiv halten. Sobald Custom-Routes registriert sind,
# deaktiviert Cloudflare standardmässig die Default-URL — und solange
# custosoft.de noch bei Strato liegt (statt Cloudflare-Zone) wäre der Worker
# dann komplett unerreichbar.
workers_dev = true

# ── Workers AI / Runtime ────────────────────────────────────────────────────
[placement]
mode = "smart"   # Latency-optimised placement

# ── D1 Database ─────────────────────────────────────────────────────────────
[[d1_databases]]
binding  = "DB"
database_name = "custosoft-db"
database_id   = "f86079bc-db52-482a-87cf-dabef3cd3e0d"

# ── R2 Buckets ───────────────────────────────────────────────────────────────
[[r2_buckets]]
binding     = "UPLOADS"
bucket_name = "custosoft-uploads"

# ── Environment Variables (non-secret) ──────────────────────────────────────
[vars]
APP_ENV         = "production"
PUBLIC_BASE_URL = "https://api.custosoft.de"
FROM_EMAIL      = "noreply@custosoftcustomers.com"
FROM_NAME       = "CustoSoft"
# CORS: allow requests from the app (and web if needed)
# pages.dev: production webapp + preview deploys (Wildcard via index.ts handler)
ALLOWED_ORIGINS = "https://custosoft.de,https://www.custosoft.de,https://custosoft-webapp.pages.dev,capacitor://localhost,http://localhost,http://localhost:5173"

# ── APNS Push (non-secret Teile) ────────────────────────────────────────────
# APNS_PRIVATE_KEY ist ein Secret (über `wrangler secret put` setzen).
# Diese drei sind nicht sensitiv und können hier stehen.
APNS_BUNDLE_ID    = "com.taironic.custosoft"
APNS_ENVIRONMENT  = "production"   # "production" für TestFlight + App Store
                                   # "sandbox" nur für lokale Xcode-Builds
# APNS_TEAM_ID und APNS_KEY_ID werden nach dem Anlegen des .p8-Keys gesetzt
# (entweder hier oder als Secrets — beides funktioniert, hier reicht weil
# die IDs nicht geheim sind):
# APNS_TEAM_ID = "ABC1234567"
# APNS_KEY_ID  = "DEF7654321"

# ── Secrets (set via: wrangler secret put SECRET_NAME) ─────────────────────
# JWT_SECRET              — 64+ char random string
# APPLE_CLIENT_ID         — com.taironic.custosoft
# APPLE_TEAM_ID           — your Apple Team ID
# APPLE_KEY_ID            — Sign In with Apple key ID
# APPLE_PRIVATE_KEY       — p8 private key (single line, \n escaped)
# APPLE_IAP_SHARED_SECRET — App Store Connect shared secret
# MAILCHANNELS_API_KEY    — optional (MailChannels needs DKIM setup)

# ── Routes (after custom domain is set up) ──────────────────────────────────
# [[routes]]
# pattern = "api.custosoft.de/*"
# zone_name = "custosoft.de"

# Erst aktivieren, sobald custosoft.de in Cloudflare als Zone existiert
# (Domain-Setup: Strato-Nameserver auf Cloudflare umstellen — siehe DEPLOY.md)
# [[routes]]
# pattern = "custosoft.de/*"
# zone_name = "custosoft.de"

# ── Cron Triggers ─────────────────────────────────────────────────────────────
[triggers]
crons = ["0 6 * * *"]   # täglich 06:00 UTC — Subscription Lifecycle

# ── Local Dev (wrangler dev) ─────────────────────────────────────────────────
[dev]
port = 8787
